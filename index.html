<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cripto Pulse – Noticias de Criptomonedas</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <header>
    <h1 id="title">Cripto Pulse – Noticias de Criptomonedas</h1>
    <!-- Selector de idioma -->
    <select id="language-selector">
      <option value="es">Español</option>
      <option value="en">English</option>
    </select>
    <!-- Menú de navegación -->
    <nav>
      <a href="#" id="nav-home">Hogar</a>
      <a href="#" id="nav-trends">Tendencias</a>
      <a href="#" id="nav-new">Nuevas monedas</a>
    </nav>
  </header>

  <main>
    <p id="intro">Mantente al día con noticias de criptomonedas en tiempo real.</p>
  </main>

  <script>
    const translations = {
      es: {
        title: "Cripto Pulse – Noticias de Criptomonedas",
        intro: "Mantente al día con noticias de criptomonedas en tiempo real.",
        nav: { home: "Hogar", trends: "Tendencias", new: "Nuevas monedas" }
      },
      en: {
        title: "Crypto Pulse – Real-Time Cryptocurrency News",
        intro: "Stay ahead with real-time cryptocurrency news.",
        nav: { home: "Home", trends: "Trends", new: "New Coins" }
      }
    };

    const selector = document.getElementById("language-selector");
    selector.addEventListener("change", (event) => {
      const lang = event.target.value;
      document.getElementById("title").textContent = translations[lang].title;
      document.getElementById("intro").textContent = translations[lang].intro;
      document.getElementById("nav-home").textContent = translations[lang].nav.home;
      document.getElementById("nav-trends").textContent = translations[lang].nav.trends;
      document.getElementById("nav-new").textContent = translations[lang].nav.new;
    });
  </script>
</body>
</html>
